
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Estilos | Boutique Victoria</title>

    <link rel="stylesheet" href="../css/filtro/filtrado.css">
    <link rel="stylesheet" href="../css/filtro/productos.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div id="navbar-placeholder"></div>

    <main class="colecciones-page">
        <header class="colecciones-hero">
            <div class="container-wrapper">
                <h1>Galería de Estilos</h1>
                <p>Explora nuestra colección completa de diseños artesanales oaxaqueños.</p><br>
            </div>
        </header>

        <section class="filtros-container container-wrapper">
            <div class="botones-filtro">
                <button class="btn-filtro active" data-filter="todos">Todos</button>
                <button class="btn-filtro" data-filter="mujeres">Mujeres</button>
                <button class="btn-filtro" data-filter="varones">Varones</button>
                <button class="btn-filtro" data-filter="niños">Niños</button>
            </div>
        </section>

        <section class="galeria-productos container-wrapper">
            <div class="grid-colecciones">

            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../js/products.js"></script> 
    <script src="../js/main.js"></script>

    <script>
        fetch('../includes/navbar.html')
            .then(res => res.text())
            .then(data => document.getElementById('navbar-placeholder').innerHTML = data);

        fetch('../includes/footer.html')
            .then(res => res.text())
            .then(data => document.getElementById('footer-placeholder').innerHTML = data);
    </script>
</body>
</html>
